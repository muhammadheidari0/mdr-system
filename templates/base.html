<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}MDR System | سامانه کنترل مدارک{% endblock %}</title>

    <link href="/static/vendor/vazirmatn/Vazirmatn-font-face.css?v=20260419a" rel="stylesheet" type="text/css" />
    <link href="/static/vendor/material-icons/material-icons-round.css?v=20260418a" rel="stylesheet">
    
    <link href="/static/css/base.css?v=20260209a" rel="stylesheet" type="text/css" />
    <link href="/static/css/layout.css?v=20260209a" rel="stylesheet" type="text/css" />
    <link href="/static/css/components.css?v=20260209a" rel="stylesheet" type="text/css" />
    <link href="/static/css/views.css?v=20260227f" rel="stylesheet" type="text/css" />
    
    {% block head %}{% endblock %}
</head>
<body class="{{ 'sidebar-closed' if request.cookies.get('sidebar_status') == 'closed' else '' }}">

    <div id="sidebar-overlay" class="overlay"></div>

    {% include 'components/sidebar.html' %}

    <div class="main-content">
        
        {% include 'components/header.html' %}

        <div class="container-fluid">
            {% block content %}{% endblock %}
        </div>

    </div>

    <div class="fab-container">
        <button id="fab-upload-btn" class="fab-btn" title="آپلود سند جدید">
            <span class="material-icons-round">cloud_upload</span>
        </button>
    </div>

    <div id="context-menu" class="context-menu">
        <div class="context-item" data-context-action="view"><span class="material-icons-round">visibility</span> مشاهده جزئیات</div>
        <div class="context-item" data-context-action="history"><span class="material-icons-round">history</span> تاریخچه</div>
        <div class="context-item" data-context-action="upload"><span class="material-icons-round">upload</span> آپلود فایل جدید</div>
        <div class="divider"></div>
        <div class="context-item text-danger" data-context-action="delete"><span class="material-icons-round">delete</span> حذف</div>
    </div>

    <div id="global-loader" class="loading-overlay" style="display: none;">
        <div class="loader"></div>
    </div>

    {% include 'components/doc_search.html' %}
    
    <script type="module" src="/static/dist/app.js?v=20260421a"></script>
    
    {% block scripts %}{% endblock %}

</body>
</html>
