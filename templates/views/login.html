<div id="view-login" class="view">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <span class="material-icons-round" style="font-size: 48px; color: var(--primary);">engineering</span>
        </div>
        <h1 class="login-title">MDR System</h1>
        <p class="login-subtitle">سامانه مدیریت اسناد</p>
      </div>
      
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email" class="form-label">ایمیل</label>
          <div class="input-group">
            <span class="material-icons-round input-icon">email</span>
            <input type="email" id="email" name="email" class="form-input" placeholder="ایمیل خود را وارد کنید" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">رمز عبور</label>
          <div class="input-group">
            <span class="material-icons-round input-icon">lock</span>
            <input type="password" id="password" name="password" class="form-input" placeholder="رمز عبور خود را وارد کنید" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">
              <span class="material-icons-round" id="passwordToggleIcon">visibility</span>
            </button>
          </div>
        </div>
        
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="material-icons-round">login</span>
          ورود به سیستم
        </button>
      </form>
      
      <div class="login-footer">
        <p class="login-help">
          در صورت بروز مشکل با مدیر سیستم تماس بگیرید
        </p>
      </div>
    </div>
  </div>
</div>

<style>
.login-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 20px;
}

.login-card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
  overflow: hidden;
  width: 100%;
  max-width: 400px;
}

.login-header {
  text-align: center;
  padding: 40px 30px 30px;
  background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
}

.login-logo {
  margin-bottom: 20px;
}

.login-title {
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-main);
  margin: 0 0 8px 0;
}

.login-subtitle {
  color: var(--text-muted);
  margin: 0;
  font-size: 0.9rem;
}

.login-form {
  padding: 30px;
}

.form-group {
  margin-bottom: 24px;
}

.form-label {
  display: block;
  font-weight: 600;
  color: var(--text-main);
  margin-bottom: 8px;
  font-size: 0.9rem;
}

.input-group {
  position: relative;
  display: flex;
  align-items: center;
}

.form-input {
  width: 100%;
  padding: 12px 16px 12px 48px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 1rem;
  transition: all 0.3s ease;
  font-family: inherit;
}

.form-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.input-icon {
  position: absolute;
  right: 16px;
  color: var(--text-muted);
  font-size: 20px;
}

.password-toggle {
  position: absolute;
  left: 12px;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  transition: color 0.2s;
}

.password-toggle:hover {
  color: var(--primary);
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.3s ease;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
}

.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.login-footer {
  padding: 20px 30px;
  background: #f8fafc;
  text-align: center;
}

.login-help {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin: 0;
}

/* Responsive */
@media (max-width: 480px) {
  .login-container {
    padding: 10px;
  }
  
  .login-card {
    max-width: 100%;
  }
  
  .login-header {
    padding: 30px 20px 20px;
  }
  
  .login-form {
    padding: 20px;
  }
  
  .login-footer {
    padding: 15px 20px;
  }
}

/* Loading state */
.login-btn.loading {
  position: relative;
  color: transparent;
}

.login-btn.loading::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  top: 50%;
  left: 50%;
  margin-left: -10px;
  margin-top: -10px;
  border: 2px solid #ffffff;
  border-radius: 50%;
  border-top-color: transparent;
  animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>

<script>
// Login functionality - فقط اگر در صفحه لاگین هستیم اجرا شود
if (window.location.pathname.includes('/login')) {
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        
        if (!loginForm || !loginBtn) return;
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showToast('لطفاً ایمیل و رمز عبور را وارد کنید', 'error');
                return;
            }
            
            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Save token to localStorage
                    localStorage.setItem('access_token', data.access_token);
                    
                    // Show success message
                    showToast('ورود با موفقیت انجام شد', 'success');
                    
                    // Redirect to dashboard after a short delay
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                    
                } else {
                    // Show error message
                    showToast(data.detail || 'خطا در ورود به سیستم', 'error');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showToast('خطا در ارتباط با سرور', 'error');
            } finally {
                // Hide loading state
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });
    });
}

function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('passwordToggleIcon');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.textContent = 'visibility_off';
    } else {
        passwordInput.type = 'password';
        toggleIcon.textContent = 'visibility';
    }
}
</script>
