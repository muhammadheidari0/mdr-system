<div id="view-edms" class="view-section" style="display: none;">
    <div class="edms-shell">
        <div class="edms-shell-header">
            <div class="edms-shell-header-main">
                <div>
                    <h2 class="edms-shell-title">
                        <span class="material-icons-round">engineering</span>
                        مدیریت مدارک مهندسی
                    </h2>
                    <p class="edms-shell-subtitle">آرشیو، ترنسمیتال و مکاتبات در یک فضای یکپارچه</p>
                </div>
                <button class="edms-stats-refresh" type="button" onclick="loadEdmsHeaderStats(true)" title="به‌روزرسانی آمار">
                    <span class="material-icons-round">refresh</span>
                </button>
            </div>

            <div class="edms-quick-stats">
                <div class="edms-quick-stat">
                    <div id="edms-stat-total" class="edms-quick-stat-value">0</div>
                    <div class="edms-quick-stat-label">کل اسناد آرشیو شده</div>
                </div>
                <div class="edms-quick-stat">
                    <div id="edms-stat-review" class="edms-quick-stat-value">0</div>
                    <div class="edms-quick-stat-label">در دست بررسی (IFA)</div>
                </div>
                <div class="edms-quick-stat">
                    <div id="edms-stat-approved" class="edms-quick-stat-value">0</div>
                    <div class="edms-quick-stat-label">تایید شده (IFC)</div>
                </div>
                <div class="edms-quick-stat">
                    <div id="edms-stat-asbuilt" class="edms-quick-stat-value">0</div>
                    <div class="edms-quick-stat-label">چون ساخت (As-Built)</div>
                </div>
            </div>
        </div>

        <div class="edms-tabs" role="tablist" aria-label="EDMS Tabs">
            <button
                type="button"
                class="edms-tab-btn active"
                id="edms-tab-archive"
                data-edms-tab="archive"
                onclick="openEdmsTab('archive', this)"
            >
                <span class="material-icons-round">inventory_2</span>
                <span>آرشیو مدارک</span>
            </button>

            <button
                type="button"
                class="edms-tab-btn"
                id="edms-tab-transmittal"
                data-edms-tab="transmittal"
                onclick="openEdmsTab('transmittal', this)"
            >
                <span class="material-icons-round">send</span>
                <span>ترنسمیتال‌ها</span>
            </button>

            <button
                type="button"
                class="edms-tab-btn"
                id="edms-tab-correspondence"
                data-edms-tab="correspondence"
                onclick="openEdmsTab('correspondence', this)"
            >
                <span class="material-icons-round">mail</span>
                <span>مکاتبات</span>
            </button>
        </div>

        <div class="edms-panels">
            {% include 'views/archive.html' %}
            {% include 'views/transmittal.html' %}
            {% include 'views/correspondence.html' %}
        </div>
    </div>
</div>
