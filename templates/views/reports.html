<div id="view-reports" class="view-section" style="display: none;">
    <div class="archive-card">
        
        <div class="archive-header">
            <div class="archive-title">
                <span class="material-icons-round" style="color:#ec4899; font-size:28px;">analytics</span>
                گزارش‌ها و تحلیل‌ها
            </div>
            <button class="btn-archive-icon" onclick="exportReportToExcel()" title="دانلود خروجی اکسل">
                <span class="material-icons-round">file_download</span> خروجی Excel
            </button>
        </div>

        <div style="padding: 20px; background: #f9fafb; border-bottom: 1px solid #eee;">
            <h4 style="margin-top:0; margin-bottom:15px; font-size:0.9rem; color:#555;">⚙️ تنظیم پارامترهای گزارش</h4>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:15px;">
                
                <div>
                    <label class="form-label-sm">پروژه</label>
                    <select id="rpt-project" class="archive-search-input">
                        <option value="">همه پروژه‌ها</option>
                    </select>
                </div>

                <div>
                    <label class="form-label-sm">دیسیپلین</label>
                    <select id="rpt-discipline" class="archive-search-input">
                        <option value="">همه</option>
                        </select>
                </div>

                <div>
                    <label class="form-label-sm">وضعیت (Status)</label>
                    <select id="rpt-status" class="archive-search-input">
                        <option value="">همه</option>
                        <option value="IFA">IFA (برای اظهار نظر)</option>
                        <option value="IFI">IFI (برای اطلاعات)</option>
                        <option value="IFC">IFC (برای ساخت)</option>
                        <option value="AB">As-Built (چون ساخت)</option>
                    </select>
                </div>

                <div>
                    <label class="form-label-sm">از تاریخ</label>
                    <input type="date" id="rpt-date-start" class="archive-search-input" style="direction:ltr;">
                </div>

                <div>
                    <label class="form-label-sm">تا تاریخ</label>
                    <input type="date" id="rpt-date-end" class="archive-search-input" style="direction:ltr;">
                </div>

                <div style="display:flex; align-items:flex-end;">
                    <button class="btn-archive-primary" style="width:100%; justify-content:center;" onclick="generateReport()">
                        <span class="material-icons-round">manage_search</span> تهیه گزارش
                    </button>
                </div>
            </div>
        </div>

        <div style="padding: 20px; display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
            <div class="rpt-card" style="background: #eef2ff; color:#3730a3; border:1px solid #c7d2fe;">
                <div class="rpt-val" id="rpt-total-count">0</div>
                <div class="rpt-lbl">مجموع اسناد یافت شده</div>
            </div>
            <div class="rpt-card" style="background: #ecfdf5; color:#065f46; border:1px solid #a7f3d0;">
                <div class="rpt-val" id="rpt-ifc-count">0%</div>
                <div class="rpt-lbl">درصد پیشرفت (IFC)</div>
            </div>
            <div class="rpt-card" style="background: #fffbeb; color:#92400e; border:1px solid #fcd34d;">
                <div class="rpt-val" id="rpt-rev-avg">0</div>
                <div class="rpt-lbl">میانگین ریویژن</div>
            </div>
        </div>

        <div style="padding: 0 20px 20px 20px;">
            <div class="table-responsive">
                <table class="archive-table" id="report-table">
                    <thead>
                        <tr>
                            <th>ردیف</th>
                            <th>شماره سند</th>
                            <th>عنوان</th>
                            <th>دیسیپلین</th>
                            <th class="center-text">Rev</th>
                            <th class="center-text">Status</th>
                            <th>تاریخ آخرین ویرایش</th>
                        </tr>
                    </thead>
                    <tbody id="rpt-tbody">
                        <tr>
                            <td colspan="7" class="center-text" style="padding:30px; color:#999;">
                                برای مشاهده نتایج، دکمه "تهیه گزارش" را بزنید.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <style>
        .rpt-card {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .rpt-val { font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; }
        .rpt-lbl { font-size: 0.85rem; opacity: 0.9; }
    </style>

    <script>
        // پر کردن دراپ‌داون‌ها هنگام لود شدن صفحه
        // این تابع باید وقتی ویو نمایش داده می‌شود یا یکبار در init صدا زده شود
        function initReportsView() {
            if(window.CACHE && window.CACHE.projects) {
                const projSel = document.getElementById('rpt-project');
                if(projSel.options.length <= 1) {
                    window.CACHE.projects.forEach(p => {
                        projSel.innerHTML += `<option value="${p.code}">${p.code} - ${p.project_name || p.name || ''}</option>`;
                    });
                }
            }
            if(window.CACHE && window.CACHE.disciplines) {
                const discSel = document.getElementById('rpt-discipline');
                if(discSel.options.length <= 1) {
                    window.CACHE.disciplines.forEach(d => {
                        discSel.innerHTML += `<option value="${d.code}">${d.name_e || d.name || d.code}</option>`;
                    });
                }
            }
        }

        async function generateReport() {
            const tbody = document.getElementById('rpt-tbody');
            tbody.innerHTML = '<tr><td colspan="7" class="center-text">⏳ در حال پردازش و دریافت اطلاعات...</td></tr>';

            // ساخت پارامترهای جستجو
            const params = new URLSearchParams();
            const project = document.getElementById('rpt-project').value;
            const disc = document.getElementById('rpt-discipline').value;
            const status = document.getElementById('rpt-status').value;
            const dateStart = document.getElementById('rpt-date-start').value;
            const dateEnd = document.getElementById('rpt-date-end').value;
            
            if(project) params.append('project_code', project);
            if(status) params.append('status', status);
            params.append('page', '1');
            params.append('size', '1000');

            try {
                const res = await fetchWithAuth(`/api/v1/mdr/search?${params.toString()}`);
                const data = await res.json();

                let items = data.items || [];

                if (disc) {
                    items = items.filter(item => getDisciplineFromCode(item.doc_number) === disc);
                }

                if (dateStart) {
                    const start = new Date(`${dateStart}T00:00:00`);
                    items = items.filter(item => item.created_at && new Date(item.created_at) >= start);
                }

                if (dateEnd) {
                    const end = new Date(`${dateEnd}T23:59:59`);
                    items = items.filter(item => item.created_at && new Date(item.created_at) <= end);
                }

                if(items.length > 0) {
                    renderReportTable(items);
                    calculateKPIs(items);
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" class="center-text" style="color:#ef4444;">هیچ سندی با این مشخصات یافت نشد.</td></tr>';
                    resetKPIs();
                }

            } catch(e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="7" class="center-text text-danger">خطا در ارتباط با سرور</td></tr>';
            }
        }

        function renderReportTable(items) {
            const tbody = document.getElementById('rpt-tbody');
            tbody.innerHTML = items.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td class="ltr-cell font-mono bold">${item.doc_number}</td>
                    <td>${item.doc_title_p || item.doc_title_e || '-'}</td>
                    <td>${getDisciplineFromCode(item.doc_number)}</td>
                    <td class="center-text"><span class="rev-badge">${item.revision}</span></td>
                    <td class="center-text">${item.status}</td>
                    <td class="center-text" style="font-size:0.8rem;">
                        ${item.created_at ? new Date(item.created_at).toLocaleDateString('fa-IR') : '-'}
                    </td>
                </tr>
            `).join('');
        }

        function calculateKPIs(items) {
            const total = items.length;
            
            // محاسبه تعداد IFC
            const ifcCount = items.filter(i => i.status === 'IFC' || i.status === 'AB').length;
            const progress = total > 0 ? Math.round((ifcCount / total) * 100) : 0;
            
            // محاسبه میانگین ریویژن (فقط یک تخمین عددی ساده)
            // فرض: A=0, B=1, ... 00=0, 01=1
            // اینجا فقط نمایشی است
            
            document.getElementById('rpt-total-count').innerText = total;
            document.getElementById('rpt-ifc-count').innerText = `${progress}%`;
            document.getElementById('rpt-rev-avg').innerText = '-'; // نیاز به منطق پیچیده‌تر دارد
        }
        
        function resetKPIs() {
            document.getElementById('rpt-total-count').innerText = '0';
            document.getElementById('rpt-ifc-count').innerText = '0%';
        }

        function getDisciplineFromCode(docNum) {
            if(!docNum) return '-';
            const parts = docNum.split('-');
            if (parts.length < 2) return '-';
            const middle = parts[1] || '';
            if (middle.length < 6) return '-';

            const serialMatch = middle.match(/(\d{2})$/);
            const serialLen = serialMatch ? 2 : 0;
            const pkg = middle.slice(2, middle.length - serialLen);
            return pkg.length >= 2 ? pkg.slice(0, 2) : '-';
        }

        function exportReportToExcel() {
            const table = document.getElementById('report-table');
            // استفاده از کتابخانه SheetJS که در base.html لود شده
            const wb = XLSX.utils.table_to_book(table, {sheet: "Report"});
            XLSX.writeFile(wb, `MDR_Report_${new Date().toLocaleDateString('fa-IR')}.xlsx`);
        }

        // Initialize immediately if visible (or call from app.js navigation)
        // setTimeout(initReportsView, 500);
    </script>
</div>
