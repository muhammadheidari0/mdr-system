<div id="view-reports" class="view-section" style="display: none;">
  <div class="archive-card">
    <div class="archive-header">
      <div class="archive-title">
        <span class="material-icons-round" style="color:#0ea5e9; font-size:28px;">analytics</span>
        Reports & Analytics
      </div>
      <button class="btn-archive-icon" type="button" data-report-action="export" title="Export">
        <span class="material-icons-round">file_download</span> Export
      </button>
    </div>

    <div style="padding:20px; background:#f8fafc; border-bottom:1px solid #e2e8f0;">
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px;">
        <div>
          <label class="form-label-sm">Project</label>
          <select id="rpt-project" class="archive-search-input"><option value="">All</option></select>
        </div>
        <div>
          <label class="form-label-sm">Discipline</label>
          <select id="rpt-discipline" class="archive-search-input"><option value="">All</option></select>
        </div>
        <div>
          <label class="form-label-sm">Status</label>
          <select id="rpt-status" class="archive-search-input"><option value="">All</option></select>
        </div>
        <div>
          <label class="form-label-sm">From</label>
          <input type="date" id="rpt-date-start" class="archive-search-input" style="direction:ltr;">
        </div>
        <div>
          <label class="form-label-sm">To</label>
          <input type="date" id="rpt-date-end" class="archive-search-input" style="direction:ltr;">
        </div>
        <div style="display:flex; align-items:flex-end;">
          <button class="btn-archive-primary" type="button" style="width:100%; justify-content:center;" data-report-action="generate">
            <span class="material-icons-round">manage_search</span> Generate
          </button>
        </div>
      </div>
    </div>

    <div style="padding:20px; display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:14px;">
      <div class="rpt-card" style="background:#fee2e2;color:#991b1b;border:1px solid #fecaca;">
        <div class="rpt-val" id="rpt-aging-overdue">0</div>
        <div class="rpt-lbl">Aging: Overdue Items</div>
      </div>
      <div class="rpt-card" style="background:#dbeafe;color:#1e3a8a;border:1px solid #bfdbfe;">
        <div class="rpt-val" id="rpt-cycle-rfi">0</div>
        <div class="rpt-lbl">Cycle Time: RFI Avg Days</div>
      </div>
      <div class="rpt-card" style="background:#dcfce7;color:#166534;border:1px solid #bbf7d0;">
        <div class="rpt-val" id="rpt-impact-count">0</div>
        <div class="rpt-lbl">Items with Potential Impacts</div>
      </div>
    </div>

    <div style="padding:0 20px 20px 20px; display:grid; grid-template-columns:1fr; gap:18px;">
      <section>
        <h4 style="margin:0 0 10px 0;">Aging Report</h4>
        <div class="table-responsive">
          <table class="archive-table" id="rpt-aging-table">
            <thead>
              <tr>
                <th>#</th><th>Item No</th><th>Type</th><th>Title</th><th>Status</th><th>Due</th><th>Aging</th>
              </tr>
            </thead>
            <tbody id="rpt-aging-tbody">
              <tr><td colspan="7" class="center-text" style="padding:20px;color:#64748b;">Generate report to load data.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section>
        <h4 style="margin:0 0 10px 0;">Cycle Time</h4>
        <div id="rpt-cycle-wrap" class="archive-card" style="padding:12px; background:#f8fafc; border:1px solid #e2e8f0;">
          <div id="rpt-cycle-summary" style="color:#475569;">No data</div>
        </div>
      </section>

      <section>
        <h4 style="margin:0 0 10px 0;">Impact Signals</h4>
        <div class="table-responsive">
          <table class="archive-table" id="rpt-impact-table">
            <thead>
              <tr>
                <th>#</th><th>Item No</th><th>Type</th><th>Title</th><th>Status</th><th>Overdue</th><th>Impact</th>
              </tr>
            </thead>
            <tbody id="rpt-impact-tbody">
              <tr><td colspan="7" class="center-text" style="padding:20px;color:#64748b;">Generate report to load data.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <style>
    .rpt-card { padding: 14px; border-radius: 10px; text-align: center; }
    .rpt-val { font-size: 1.8rem; font-weight: bold; margin-bottom: 4px; }
    .rpt-lbl { font-size: 0.85rem; opacity: 0.9; }
  </style>
</div>
