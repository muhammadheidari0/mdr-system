<div id="view-contractor" class="view-section" style="display: none;">
    <div class="edms-shell module-workspace-shell contractor-shell">
        <div class="edms-shell-header">
            <div class="edms-shell-header-main">
                <div>
                    <h2 class="edms-shell-title">
                        <span class="material-icons-round">construction</span>
                        دفتر فنی و اجرا (پیمانکار)
                    </h2>
                    <p class="edms-shell-subtitle">مدیریت عملیات اجرایی، درخواست‌ها، کیفیت و پیگیری کارگاهی</p>
                </div>
            </div>

            <div class="edms-quick-stats">
                <div class="edms-quick-stat">
                    <div id="contractor-stat-total" class="edms-quick-stat-value">0</div>
                    <div class="edms-quick-stat-label">کل آیتم‌ها</div>
                </div>
                <div class="edms-quick-stat">
                    <div id="contractor-stat-open" class="edms-quick-stat-value">0</div>
                    <div class="edms-quick-stat-label">باز</div>
                </div>
                <div class="edms-quick-stat">
                    <div id="contractor-stat-waiting" class="edms-quick-stat-value">0</div>
                    <div class="edms-quick-stat-label">در انتظار</div>
                </div>
                <div class="edms-quick-stat">
                    <div id="contractor-stat-overdue" class="edms-quick-stat-value">0</div>
                    <div class="edms-quick-stat-label">معوق</div>
                </div>
            </div>
        </div>

        <div class="edms-tabs module-tabs" role="tablist" aria-label="Contractor tabs">
            <button
                type="button"
                class="edms-tab-btn contractor-tab-btn active"
                data-contractor-tab="execution"
                onclick="openContractorTab('execution', this)"
            >
                <span class="material-icons-round">view_kanban</span>
                <span>دفتر فنی و اجرا</span>
            </button>

            <button
                type="button"
                class="edms-tab-btn contractor-tab-btn"
                data-contractor-tab="requests"
                onclick="openContractorTab('requests', this)"
            >
                <span class="material-icons-round">outgoing_mail</span>
                <span>درخواست‌ها و RFI</span>
            </button>

            <button
                type="button"
                class="edms-tab-btn contractor-tab-btn"
                data-contractor-tab="quality"
                onclick="openContractorTab('quality', this)"
            >
                <span class="material-icons-round">rule</span>
                <span>کیفیت و NCR</span>
            </button>
        </div>

        <div class="module-workspace-panels">
            <section id="contractor-panel-execution" class="module-workspace-panel active">
                <div class="module-crud-root" data-module="contractor" data-tab="execution" data-title="دفتر فنی و اجرا"></div>
            </section>
            <section id="contractor-panel-requests" class="module-workspace-panel">
                <div class="module-crud-root" data-module="contractor" data-tab="requests" data-title="درخواست‌ها و RFI"></div>
            </section>
            <section id="contractor-panel-quality" class="module-workspace-panel">
                <div class="module-crud-root" data-module="contractor" data-tab="quality" data-title="کیفیت و NCR"></div>
            </section>
        </div>
    </div>
</div>
