<div class="archive-card" id="settingsPermissionsTabRoot">
  <div class="archive-header">
    <div class="header-content">
      <h2 class="archive-title">
        <span class="material-icons-round" style="margin-left: 8px;">shield</span>
        ماتریس سطح دسترسی
      </h2>
      <p class="archive-subtitle">
        نقش‌ها را بر اساس مجوزهای ماژولی مدیریت کنید. دسترسی ادمین همیشه کامل است.
      </p>
    </div>
    <div class="header-actions">
      <button class="btn-secondary" type="button" data-permissions-action="init-permissions-settings" data-force="true">
        <span class="material-icons-round">refresh</span>
        بازخوانی
      </button>
    </div>
  </div>

  <div class="archive-content">
    <div class="form-help" style="margin-bottom: 10px;">
      مدیریت Scope پروژه/دیسیپلین از بخش کاربران انجام می‌شود.
    </div>

    <div id="permissionsCategoryTabs" class="edms-tab-buttons" style="margin-bottom: 12px;">
      <button type="button" class="edms-tab-btn active" data-permissions-category="consultant" data-permissions-action="switch-permissions-category">
        <span class="material-icons-round">fact_check</span>
        مشاور
      </button>
      <button type="button" class="edms-tab-btn" data-permissions-category="contractor" data-permissions-action="switch-permissions-category">
        <span class="material-icons-round">construction</span>
        پیمانکار
      </button>
      <button type="button" class="edms-tab-btn" data-permissions-category="employer" data-permissions-action="switch-permissions-category">
        <span class="material-icons-round">domain</span>
        کارفرما
      </button>
      <button type="button" class="edms-tab-btn" data-permissions-category="dcc" data-permissions-action="switch-permissions-category">
        <span class="material-icons-round">badge</span>
        DCC
      </button>
      <button type="button" class="edms-tab-btn" data-permissions-category="system" data-permissions-action="switch-permissions-category">
        <span class="material-icons-round">admin_panel_settings</span>
        سیستم (کامل)
      </button>
    </div>

    <div class="permissions-toolbar permissions-toolbar-minimal">
      <div class="permissions-toolbar-filters">
        <div class="permissions-toolbar-item">
          <label class="form-label-sm" for="permissionsSearchInput">جستجوی مجوز</label>
          <input id="permissionsSearchInput" class="form-input permissions-filter-input" type="text" placeholder="مثال: transmittal یا issue">
        </div>
        <div class="permissions-toolbar-item">
          <label class="form-label-sm" for="permissionsResourceFilter">فیلتر منبع</label>
          <select id="permissionsResourceFilter" class="form-input permissions-filter-input">
            <option value="">همه منابع</option>
          </select>
        </div>
      </div>

      <div class="permissions-toolbar-actions">
        <button class="btn-archive-icon" type="button" data-permissions-action="expand-all-permission-groups" title="باز کردن همه گروه‌ها">
          <span class="material-icons-round">unfold_more</span>
        </button>
        <button class="btn-archive-icon" type="button" data-permissions-action="collapse-all-permission-groups" title="بستن همه گروه‌ها">
          <span class="material-icons-round">unfold_less</span>
        </button>
        <button class="btn-archive-icon" type="button" data-permissions-action="reset-permission-filters" title="پاکسازی فیلترها">
          <span class="material-icons-round">filter_alt_off</span>
        </button>
        <button class="btn-primary" type="button" data-permissions-action="save-permissions-matrix">
          <span class="material-icons-round">save</span>
          ذخیره تغییرات
        </button>
      </div>
    </div>

    <div class="table-container permissions-table-wrap">
      <table class="archive-table permissions-matrix-table" id="permissionsMatrixTable">
        <thead id="permissionsMatrixHead"></thead>
        <tbody id="permissionsMatrixBody">
          <tr>
            <td class="center-text muted" colspan="6" style="padding: 36px;">در حال بارگذاری ماتریس دسترسی...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
