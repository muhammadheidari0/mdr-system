<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم | MDR System</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <!-- CSS -->
    <link href="/static/css/style.css" rel="stylesheet">
    
    <style>
        body.login-body {
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .login-header {
            text-align: center;
            padding: 40px 30px 30px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .login-logo {
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 8px 0;
        }

        .login-subtitle {
            color: #64748b;
            margin: 0;
            font-size: 0.9rem;
        }

        .login-form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            color: #64748b;
            font-size: 20px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            padding: 20px 30px;
            background: #f8fafc;
            text-align: center;
        }

        .login-help {
            color: #64748b;
            font-size: 0.85rem;
            margin: 0;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="login-body">
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <span class="material-icons-round" style="font-size: 48px; color: #3b82f6;">engineering</span>
                </div>
                <h1 class="login-title">MDR System</h1>
                <p class="login-subtitle">سامانه مدیریت اسناد</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div id="message-container"></div>
                
                <div class="form-group">
                    <label for="email" class="form-label">ایمیل</label>
                    <div class="input-group">
                        <span class="material-icons-round input-icon">email</span>
                        <input type="email" id="email" name="email" class="form-input" placeholder="ایمیل خود را وارد کنید" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">رمز عبور</label>
                    <div class="input-group">
                        <span class="material-icons-round input-icon">lock</span>
                        <input type="password" id="password" name="password" class="form-input" placeholder="رمز عبور خود را وارد کنید" required>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="material-icons-round">login</span>
                    ورود به سیستم
                </button>
            </form>
            
            <div class="login-footer">
                <p class="login-help">
                    ???? ?????? ??????? ???? ?? ???? ????? ???? ??????
                </p>
            </div>
        </div>
    </div>

    <!-- فقط auth.js را لود می‌کنیم، نه app.js -->
    <script src="/static/js/auth.js"></script>
    
    <script>
        // منطق لاگین برای صفحه ایزوله
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const messageContainer = document.getElementById('message-container');
            
            if (!loginForm || !loginBtn) return;
            
            function showMessage(message, type = 'error') {
                messageContainer.innerHTML = `
                    <div class="${type}-message">
                        ${message}
                    </div>
                `;
                
                // پاک کردن پیام بعد از 5 ثانیه
                setTimeout(() => {
                    messageContainer.innerHTML = '';
                }, 5000);
            }
            
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                if (!email || !password) {
                    showMessage('لطفاً ایمیل و رمز عبور را وارد کنید', 'error');
                    return;
                }
                
                // Show loading state
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="material-icons-round">hourglass_empty</span> در حال ورود...';
                
                try {
                    // استفاده از AuthManager برای ورود
                    const result = await window.authManager.login(email, password);
                    
                    if (result.success) {
                        showMessage('ورود با موفقیت انجام شد', 'success');
                        
                        // Redirect to dashboard after a short delay
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1500);
                    } else {
                        showMessage(result.error || 'خطا در ورود به سیستم', 'error');
                    }
                    
                } catch (error) {
                    console.error('Login error:', error);
                    showMessage('خطا در ارتباط با سرور', 'error');
                } finally {
                    // Hide loading state
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<span class="material-icons-round">login</span> ورود به سیستم';
                }
            });
        });
    </script>
    
</body>
</html>
